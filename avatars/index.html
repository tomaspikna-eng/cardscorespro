function makeSVG(av) {
  return `<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">${av.svg}</svg>`;
}

function downloadPNG(av) {
  const svgStr = makeSVG(av);
  const blob = new Blob([svgStr], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 256;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, 256, 256);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = `csp-avatar-${av.id}-${av.name.toLowerCase().replace(/\s/g,'-').replace(/[^\w-]/g,'')}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = url;
}

function downloadAll() {
  const all = [...AVATARS.biliard, ...AVATARS.sipky, ...AVATARS.bowling];
  all.forEach((av, i) => setTimeout(() => downloadPNG(av), i * 200));
}

function renderGrid(id, list) {
  const grid = document.getElementById(id);
  list.forEach(av => {
    const div = document.createElement('div');
    div.className = 'av';
    div.innerHTML = makeSVG(av) + `<div class="name">${av.name}</div><div class="num">${av.id}</div>`;
    div.onclick = () => downloadPNG(av);
    grid.appendChild(div);
  });
}

renderGrid('biliard', AVATARS.biliard);
renderGrid('sipky', AVATARS.sipky);
