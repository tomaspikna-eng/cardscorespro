<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cardscorespro – Prihlásenie do turnaja</title>
  <style>
    :root{
      --bg:#050505;--bg2:#0b0b0b;--line:rgba(255,255,255,.08);--line-soft:rgba(255,255,255,.05);
      --text:#f4f4f4;--gold:#d8b04b;--green:#22d36b;--danger:#c85757;--shadow:0 20px 60px rgba(0,0,0,.34);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;font-family:Inter,Arial,Helvetica,sans-serif;color:var(--text);
      background:radial-gradient(circle at top center, rgba(216,176,75,.08), transparent 24%),linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);
    }
    button,input{font:inherit}
    .page{width:min(860px,calc(100% - 32px));margin:24px auto 40px;display:grid;gap:18px}
    .panel{border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.015));box-shadow:var(--shadow)}
    .topbar{padding:14px 18px;display:flex;align-items:center}
    .brand{display:flex;align-items:center;gap:14px}
    .brand-mark{width:54px;height:54px;border-radius:16px;border:1px solid rgba(216,176,75,.34);background:rgba(216,176,75,.06);display:grid;place-items:center;color:var(--gold);font-weight:900;letter-spacing:.04em}
    .brand-title{font-size:1.35rem;font-weight:900;letter-spacing:-.04em}
    .brand-title .gold{color:var(--gold)} .brand-title .white{color:#fff}
    .content{padding:22px;display:grid;gap:18px}
    h1{margin:0;color:var(--gold);font-size:clamp(2rem,4vw,3.2rem);line-height:1.02;letter-spacing:-.05em;text-align:center}
    .input{width:100%;min-height:78px;padding:0 22px;border-radius:22px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--text);outline:none;font-size:1.28rem;font-weight:700;text-align:center}
    .input::placeholder{color:#8d8d8d;font-weight:600}
    .btn-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
    .btn{min-height:52px;padding:0 22px;border:none;border-radius:16px;font-weight:900;cursor:pointer;font-size:1rem}
    .btn-green{background:var(--green);color:#06230f}
    .btn-dark{background:rgba(255,255,255,.04);color:var(--text);border:1px solid var(--line)}
    .notice,.error{display:none;padding:12px 14px;border-radius:14px;font-size:.92rem;line-height:1.5;text-align:center}
    .notice{background:rgba(34,211,107,.10);border:1px solid rgba(34,211,107,.18);color:#d8ffe6}
    .error{background:rgba(200,87,87,.12);border:1px solid rgba(200,87,87,.18);color:#ffd6d6}
    .players-box{min-height:260px;padding:18px;border-radius:22px;border:1px solid var(--line-soft);background:rgba(255,255,255,.02);white-space:pre-line;line-height:1.8;color:#f0f0f0;font-size:1.08rem}
    .empty-text{color:#8f8f8f}
    @media (max-width:760px){.input{min-height:68px;font-size:1.08rem}}
  </style>
</head>
<body>
  <div class="page">
    <header class="panel topbar">
      <div class="brand">
        <div class="brand-mark">CSP</div>
        <div class="brand-title"><span class="gold">CardScores</span><span class="white">Pro</span></div>
      </div>
    </header>

    <section class="panel content">
      <h1>Prihlásenie do turnaja</h1>

      <input id="playerName" class="input" type="text" maxlength="40" placeholder="Meno alebo prezývka" />

      <div class="btn-row">
        <button class="btn btn-green" id="joinBtn" type="button">OK</button>
        <button class="btn btn-dark" id="clearBtn" type="button">Vyčistiť</button>
      </div>

      <div class="notice" id="noticeBox"></div>
      <div class="error" id="errorBox"></div>

      <div id="playersBox" class="players-box"><span class="empty-text">Načítavam...</span></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "DOPLN_SUPABASE_URL";
    const SUPABASE_ANON_KEY = "DOPLN_SUPABASE_ANON_KEY";
    const TABLE_NAME = "guest_signups";

    const slug = new URLSearchParams(window.location.search).get("turnaj") || "default";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const el = {
      playerName: document.getElementById("playerName"),
      joinBtn: document.getElementById("joinBtn"),
      clearBtn: document.getElementById("clearBtn"),
      playersBox: document.getElementById("playersBox"),
      noticeBox: document.getElementById("noticeBox"),
      errorBox: document.getElementById("errorBox")
    };

    function normalizeName(value){ return value.trim().replace(/\s+/g, " "); }
    function normalizeCompare(value){
      return normalizeName(value).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function showNotice(text){
      el.noticeBox.style.display = "block";
      el.noticeBox.textContent = text;
      el.errorBox.style.display = "none";
      el.errorBox.textContent = "";
    }

    function showError(text){
      el.errorBox.style.display = "block";
      el.errorBox.textContent = text;
      el.noticeBox.style.display = "none";
      el.noticeBox.textContent = "";
    }

    function clearMessages(){
      el.noticeBox.style.display = "none";
      el.noticeBox.textContent = "";
      el.errorBox.style.display = "none";
      el.errorBox.textContent = "";
    }

    function renderPlayers(players){
      if(!players.length){
        el.playersBox.innerHTML = '<span class="empty-text">Zatiaľ nie je prihlásený žiadny hráč.</span>';
        return;
      }
      el.playersBox.textContent = players.map(p => p.display_name).join("\n");
    }

    async function loadPlayers(){
      const { data, error } = await supabaseClient
        .from(TABLE_NAME)
        .select("display_name, created_at")
        .eq("tournament_slug", slug)
        .order("created_at", { ascending: true });

      if(error){
        showError("Nepodarilo sa načítať zoznam hráčov.");
        el.playersBox.innerHTML = '<span class="empty-text">Zoznam sa nepodarilo načítať.</span>';
        return;
      }
      renderPlayers(data || []);
    }

    async function addPlayer(){
      clearMessages();

      const cleanName = normalizeName(el.playerName.value);
      const normalizedName = normalizeCompare(cleanName);

      if(!cleanName){ showError("Zadaj meno alebo prezývku."); return; }
      if(cleanName.length < 2){ showError("Meno je príliš krátke."); return; }

      const { error } = await supabaseClient
        .from(TABLE_NAME)
        .insert({
          tournament_slug: slug,
          display_name: cleanName,
          normalized_name: normalizedName
        });

      if(error){
        if(String(error.message || "").toLowerCase().includes("duplicate") || String(error.code) === "23505"){
          showError("Tento hráč je už prihlásený.");
          return;
        }
        showError("Prihlásenie sa nepodarilo.");
        return;
      }

      el.playerName.value = "";
      el.playerName.focus();
      showNotice("Hráč bol prihlásený.");
      await loadPlayers();
    }

    el.joinBtn.addEventListener("click", addPlayer);
    el.clearBtn.addEventListener("click", () => {
      el.playerName.value = "";
      el.playerName.focus();
      clearMessages();
    });

    el.playerName.addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        e.preventDefault();
        addPlayer();
      }
    });

    loadPlayers();
  </script>
</body>
</html>
